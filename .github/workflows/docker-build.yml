name: Build and Push Docker Images

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    
    - name: Build and push Breaker IED v1
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.breaker-v1
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gotham-breaker-v1:latest
    
    - name: Build and push Breaker IED v2
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.breaker-v2
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gotham-breaker-v2:latest
    
    - name: Build and push Control IED
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile.ied-simulator
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gotham-control-ied:latest
    
    - name: Build and push Central Monitoring
      uses: docker/build-push-action@v4
      with:
        context: ./central-monitoring
        file: ./central-monitoring/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/gotham-central-monitoring:latest
